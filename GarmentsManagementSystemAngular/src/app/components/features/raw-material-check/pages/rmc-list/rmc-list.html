<div class="container-fluid mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">

            <h4 class="mb-0">

                Raw Material Check List

            </h4>

            <a
                routerLink="/raw-material-check/add"
                class="btn btn-light">

                + Generate New

            </a>

        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-bordered table-hover">

                    <thead class="table-dark">

                        <tr>

                            <th>#</th>

                            <th>Order No</th>

                            <th>Buyer</th>

                            <th>Style</th>

                            <th>Order Qty</th>

                            <th>Grand Cost</th>

                            <th>Created Date</th>

                            <th width="180">

                                Action

                            </th>

                        </tr>

                    </thead>

                    <tbody>

                        <tr
                            *ngFor="let rmc of rmcChecks; let i=index">

                            <td>

                                {{i+1}}

                            </td>

                            <td>

                               {{rmc.orderNumber}}

                               </td>

                            <td>

                                {{rmc.buyerName}}

                            </td>

                            <td>

                                {{rmc.styleName}}

                            </td>

                            <td>

                                {{rmc.totalOrderQty}}

                            </td>

                            <td>

                                {{rmc.grandTotalCost | number:'1.2-2'}}

                            </td>

                            <td>

                                {{rmc.createdAt | date:'dd-MMM-yyyy'}}

                            </td>

                            <td>

                                <a
                                    class="btn btn-sm btn-info me-2"
                                    [routerLink]="['/raw-material-check',rmc.id]">

                                    View

                                </a>

                                <button
                                    class="btn btn-sm btn-danger"
                                    (click)="deleteRmc(rmc.id)">

                                    Delete

                                </button>

                            </td>

                        </tr>

                        <tr *ngIf="rmcChecks.length==0">

                            <td
                                colspan="7"
                                class="text-center">

                                No Data Found

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>
