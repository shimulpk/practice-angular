<div class="container-fluid">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h4 class="mb-0">

                <i class="bi bi-people-fill"></i>

                {{ isEdit ? 'Update Buyer' : 'Add Buyer' }}

            </h4>

        </div>

        <div class="card-body">

            <form [formGroup]="buyerForm" (ngSubmit)="saveBuyer()">

                <div class="row">

                    <!-- Buyer Code -->

                    <div class="col-md-4 mb-3">

                        <label class="form-label">

                            Buyer Code <span class="text-danger">*</span>

                        </label>

                        <input
                                type="text"
                                class="form-control"
                                formControlName="buyerCode">

                    </div>

                    <!-- Buyer Name -->

                    <div class="col-md-4 mb-3">

                        <label class="form-label">

                            Buyer Name <span class="text-danger">*</span>

                        </label>

                        <input
                                type="text"
                                class="form-control"
                                formControlName="buyerName">

                    </div>

                    <!-- Country -->

                    <div class="col-md-4 mb-3">

                        <label class="form-label">

                            Country

                        </label>

                        <select
                                class="form-select"
                                formControlName="country">

                            <option value="">Select Country</option>

                            <option>Bangladesh</option>

                            <option>China</option>

                            <option>India</option>

                            <option>Pakistan</option>

                            <option>Vietnam</option>

                            <option>Turkey</option>

                        </select>

                    </div>

                    <!-- Address -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Address

                        </label>

                        <textarea
                                rows="3"
                                class="form-control"
                                formControlName="address">

                        </textarea>

                    </div>

                    <!-- Website -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Website

                        </label>

                        <input
                                type="text"
                                class="form-control"
                                formControlName="website">

                    </div>

                    <!-- Currency -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Currency

                        </label>

                        <select
                                class="form-select"
                                formControlName="currency">

                            <option value="">Select Currency</option>

                            <option>USD</option>

                            <option>BDT</option>

                            <option>EUR</option>

                            <option>GBP</option>

                            <option>JPY</option>

                            <option>CNY</option>

                        </select>

                    </div>

                    <!-- Payment Terms -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Payment Terms

                        </label>

                        <select
                                class="form-select"
                                formControlName="paymentTerms">

                            <option value="">Select Payment Terms</option>

                            <option>Cash</option>

                            <option>Advance</option>

                            <option>TT</option>

                            <option>LC</option>

                            <option>30 Days</option>

                            <option>45 Days</option>

                            <option>60 Days</option>

                            <option>90 Days</option>

                        </select>

                    </div>

                </div>

                <hr>

                <!-- Contact Section এখানে শুরু হবে -->
                 <!-- ========================= -->
<!-- Contact Information -->
<!-- ========================= -->

<div class="d-flex justify-content-between align-items-center mb-3">

    <h5 class="mb-0">

        <i class="bi bi-person-lines-fill"></i>

        Contact Information

    </h5>

    <button
            type="button"
            class="btn btn-primary btn-sm"
            (click)="addContact()">

        <i class="bi bi-plus-circle"></i>

        Add Contact

    </button>

</div>

<div formArrayName="contacts">

    <div
            *ngFor="let contact of contacts.controls; let i = index"
            [formGroupName]="i"
            class="card mb-3 border-primary">

        <div
                class="card-header d-flex justify-content-between align-items-center">

            <strong>

                Contact {{ i + 1 }}

            </strong>

            <button
                    type="button"
                    class="btn btn-danger btn-sm"
                    (click)="removeContact(i)"
                    [disabled]="contacts.length==1">

                <i class="bi bi-trash"></i>

            </button>

        </div>

        <div class="card-body">

            <div class="row">

                <!-- Contact Name -->

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Contact Name

                        <span class="text-danger">*</span>

                    </label>

                    <input
                            type="text"
                            class="form-control"
                            formControlName="contactName">

                </div>

                <!-- Designation -->

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Designation

                    </label>

                    <input
                            type="text"
                            class="form-control"
                            formControlName="designation">

                </div>

                <!-- Email -->

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Email

                    </label>

                    <input
                            type="email"
                            class="form-control"
                            formControlName="email">

                </div>

                <!-- Phone -->

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Phone

                    </label>

                    <input
                            type="text"
                            class="form-control"
                            formControlName="phone">

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Action button -->

<div class="d-flex justify-content-end gap-2 mt-4">

    <!-- Cancel -->

    <button
            type="button"
            class="btn btn-secondary"
            routerLink="/buyers">

        <i class="bi bi-arrow-left-circle"></i>

        Back

    </button>

    <!-- Reset -->

    <button
            type="button"
            class="btn btn-warning"
            (click)="resetForm()">

        <i class="bi bi-arrow-clockwise"></i>

        Reset

    </button>

    <!-- Save / Update -->

    <button
            type="submit"
            class="btn"
            [ngClass]="isEdit ? 'btn-success' : 'btn-primary'"
            [disabled]="buyerForm.invalid || loading">

        <span
                *ngIf="loading"
                class="spinner-border spinner-border-sm me-2">
        </span>

        <i
                *ngIf="!loading"
                class="bi"
                [ngClass]="isEdit ? 'bi-check-circle' : 'bi-save'">
        </i>

        {{ isEdit ? 'Update Buyer' : 'Save Buyer' }}

    </button>

</div>


            </form>

        </div>

    </div>

</div>
