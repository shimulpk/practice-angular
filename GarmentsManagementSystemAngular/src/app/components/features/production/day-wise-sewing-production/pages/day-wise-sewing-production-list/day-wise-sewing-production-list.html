<div class="container-fluid py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold">View Day Wise Sewing Production</h3>

    <a routerLink="/sewing-production/add" class="btn btn-primary">
      <i class="bi bi-plus-circle"></i>

      Add Day Wise Sewing Production
    </a>
  </div>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary"></div>
  </div>

  <div *ngIf="!loading" class="card shadow">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-dark">
          <tr>
            <th style="width: 70px">SL</th>

            <th>Sewing Plan</th>

            <th>Buyer</th>

            <th>Style</th>

            <th class="text-center">Target Qty</th>

            <th class="text-center">Status</th>

            <th class="text-center">Action</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let plan of sewingPlans; let i = index">
            <td>
              {{ i + 1 }}
            </td>

            <td>
              <strong>
                {{ plan.sewingPlanId }}
              </strong>
            </td>

            <td>
              {{ plan.buyerName }}
            </td>

            <td>
              {{ plan.styleNo }}
            </td>

            <td class="text-center">
              {{ plan.inputReceivedQty }}
            </td>

            <td class="text-center">
              <span
                class="badge"
                [ngClass]="{
                  'bg-success': plan.status == 'COMPLETED',

                  'bg-warning text-dark': plan.status == 'IN_SEWING',

                  'bg-secondary': plan.status == 'PENDING',
                }"
              >
                {{ plan.status }}
              </span>
            </td>

            <td class="text-center">
              <button class="btn btn-sm btn-primary" (click)="view(plan.id)">
                <i class="bi bi-eye"></i>

                View
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
