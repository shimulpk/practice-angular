<div class="container-fluid mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">

            <h4 class="mb-0">
                Machine List
            </h4>

            <a
                routerLink="/machines/add"
                class="btn btn-light">

                <i class="bi bi-plus-circle"></i>

                Add Machine

            </a>

        </div>

        <div class="card-body">

            <!-- Search -->

            <div class="row mb-3">

                <div class="col-md-4">

                    <input
                        type="text"
                        class="form-control"
                        placeholder="Search by Machine ID, Name, Type or Line..."
                        [(ngModel)]="searchText"
                        (input)="search()">

                </div>

            </div>

            <!-- Loading -->

            <div
                *ngIf="loading"
                class="text-center py-5">

                <div class="spinner-border text-primary"></div>

            </div>

            <!-- Table -->

            <div
                class="table-responsive"
                *ngIf="!loading">

                <table class="table table-bordered table-hover align-middle">

                    <thead class="table-light">

                        <tr>

                            <th>#</th>

                            <th>Machine ID</th>

                            <th>Machine Name</th>

                            <th>Type</th>

                            <th>Production Line</th>

                            <th>Status</th>

                            <th width="170">Action</th>

                        </tr>

                    </thead>

                    <tbody>

                        <tr *ngIf="filteredMachines.length === 0">

                            <td
                                colspan="7"
                                class="text-center text-muted">

                                No Machine Found.

                            </td>

                        </tr>

                        <tr
                            *ngFor="let machine of filteredMachines; let i = index">

                            <td>{{ i + 1 }}</td>

                            <td>{{ machine.machineId }}</td>

                            <td>{{ machine.machineName }}</td>

                            <td>{{ machine.type }}</td>

                            <td>{{ machine.lineId }}</td>

                            <td class="text-center">

                                <span
                                    class="badge"
                                    [ngClass]="machine.active ? 'bg-success' : 'bg-danger'">

                                    {{ machine.active ? 'Active' : 'Inactive' }}

                                </span>

                            </td>

                            <td class="text-center">

                                <button
                                    class="btn btn-warning btn-sm me-2"
                                    (click)="edit(machine.id)">

                                    <i class="bi bi-pencil-square"></i>

                                </button>

                                <button
                                    class="btn btn-danger btn-sm"
                                    (click)="delete(machine.id)">

                                    <i class="bi bi-trash"></i>

                                </button>

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>
