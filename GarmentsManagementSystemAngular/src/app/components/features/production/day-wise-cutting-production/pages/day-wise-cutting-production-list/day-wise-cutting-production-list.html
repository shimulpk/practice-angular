<div class="container-fluid py-4">

    <!-- Header -->

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h3 class="fw-bold mb-0">

                <i class="bi bi-scissors me-2"></i>

                Day Wise Cutting Production

            </h3>

            <small class="text-muted">

                View Cutting Plan Wise Production

            </small>

        </div>

        <a
            routerLink="/cutting-production/add"
            class="btn btn-primary">

            <i class="bi bi-plus-circle me-2"></i>

            Add Production

        </a>

    </div>

    <!-- Table -->

    <div class="card shadow-sm border-0">

        <div class="card-body p-0">

            <div class="table-responsive">

                <table class="table table-hover align-middle mb-0">

                    <thead class="table-primary">

                        <tr>

                            <th width="70">SL</th>

                            <th>Cutting Plan</th>

                            <th>Buyer</th>

                            <th>Style</th>

                            <th>Target</th>

                            <th>Status</th>

                            <th class="text-center" width="120">

                                Action

                            </th>

                        </tr>

                    </thead>

                    <tbody>

                        <tr *ngIf="loading">

                            <td colspan="7" class="text-center py-4">

                                Loading...

                            </td>

                        </tr>

                        <tr
                            *ngFor="let plan of cuttingPlans; let i = index">

                            <td>

                                {{ i + 1 }}

                            </td>

                            <td>

                                <strong>

                                    {{ plan.cuttingPlanId }}

                                </strong>

                            </td>

                            <td>

                                {{ plan.buyerName }}

                            </td>

                            <td>

                                {{ plan.styleNo }}

                            </td>

                            <td>

                                {{ plan.plannedPieces }}

                            </td>

                            <td>

                                <span
                                    class="badge"
                                    [ngClass]="{

                                    'bg-warning': plan.status==='PENDING',

                                    'bg-success': plan.status==='COMPLETED'

                                }">

                                    {{ plan.status }}

                                </span>

                            </td>

                            <td class="text-center">

                               <button
                                  class="btn btn-sm btn-outline-primary"
                                  (click)="view(plan.id)"
                                   title="View Production Details">

                                   <i class="bi bi-eye-fill me-1"></i>

                                          View

                                             </button>
                            </td>

                        </tr>

                        <tr
                            *ngIf="!loading && cuttingPlans.length==0">

                            <td
                                colspan="7"
                                class="text-center py-4">

                                No Cutting Plan Found

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>
