<div class="d-flex justify-content-between align-items-center mb-4">

    <h3 class="mb-0">

        UOM List

    </h3>

    <a
        routerLink="/uoms/add"
        class="btn btn-primary">

        <i class="bi bi-plus-circle"></i>

        Add UOM

    </a>

</div>

<!-- Loading -->

<div
    *ngIf="loading"
    class="text-center my-5">

    <div class="spinner-border text-primary"></div>

</div>

<!-- Table -->

<div
    class="card shadow-sm"
    *ngIf="!loading">

    <div class="table-responsive">

        <table
            class="table table-hover table-bordered align-middle mb-0">

            <thead class="table-dark">

            <tr>

                <th>#</th>

                <th>Product</th>

                <th>Size</th>

                <th>Body</th>

                <th>Sleeve</th>

                <th>Pocket</th>

                <th>Wastage %</th>

                <th>Shrinkage %</th>

                <th>Total Base Fabric</th>

                <th width="180">

                    Action

                </th>

            </tr>

            </thead>

            <tbody>

            <tr
                *ngFor="let uom of uoms; let i = index">

                <td>

                    {{ i + 1 }}

                </td>

                <td>

                    {{ uom.productName }}

                </td>

                <td>

                    {{ uom.size }}

                </td>

                <td>

                    {{ uom.body }}

                </td>

                <td>

                    {{ uom.sleeve }}

                </td>

                <td>

                    {{ uom.pocket }}

                </td>

                <td>

                    {{ uom.wastage }}%

                </td>

                <td>

                    {{ uom.shrinkage }}%

                </td>

                <td>

                    <span class="badge bg-success">

                        {{ uom.totalBaseFabric }}

                    </span>

                </td>

                <td>

                    <a
                        [routerLink]="['/uoms/view', uom.id]"
                        class="btn btn-sm btn-info me-1">

                        <i class="bi bi-eye"></i>

                    </a>

                    <a
                        [routerLink]="['/uoms/edit', uom.id]"
                        class="btn btn-sm btn-warning me-1">

                        <i class="bi bi-pencil-square"></i>

                    </a>

                    <button
                        class="btn btn-sm btn-danger"
                        (click)="deleteUom(uom.id)">

                        <i class="bi bi-trash"></i>

                    </button>

                </td>

            </tr>

            <tr *ngIf="uoms.length === 0">

                <td
                    colspan="10"
                    class="text-center">

                    No UOM Found

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>
