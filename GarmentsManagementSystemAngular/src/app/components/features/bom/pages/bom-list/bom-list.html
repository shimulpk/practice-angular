<div class="container-fluid">

    <!-- Header -->

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h3 class="mb-0">

            <i class="bi bi-diagram-3-fill"></i>

            BOM(BILL OF MATERIALS) Style List

        </h3>

    </div>

    <!-- Loading -->

    <div
        *ngIf="loading"
        class="text-center py-5">

        <div class="spinner-border text-primary"></div>

    </div>

    <!-- Table -->

    <div
        class="card"
        *ngIf="!loading">

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-bordered table-hover align-middle">

                    <thead class="table-dark">

                        <tr>

                            <th>#</th>

                            <th>Style Code</th>

                            <th>Style Name</th>

                            <th>Style Type</th>

                            <th>Approval</th>

                            <th>Status</th>

                            <th width="120">Action</th>

                        </tr>

                    </thead>

                    <tbody>

                        <tr *ngFor="let style of styles; let i = index">

                            <td>{{ i + 1 }}</td>

                            <td>{{ style.styleCode }}</td>

                            <td>{{ style.styleName }}</td>

                            <td>{{ style.styleType }}</td>

                            <td>{{ style.approvalStatus }}</td>

                            <td>

                                <span
                                    class="badge"
                                    [ngClass]="style.active ? 'bg-success' : 'bg-danger'">

                                    {{ style.active ? 'Active' : 'Inactive' }}

                                </span>

                            </td>

                            <td>

                                <a
                                    class="btn btn-sm btn-primary"
                                    [routerLink]="['/bom/style', style.id]">

                                    <i class="bi bi-eye-fill"></i>

                                </a>

                            </td>

                        </tr>

                        <tr *ngIf="styles.length === 0">

                            <td
                                colspan="7"
                                class="text-center">

                                No Style Found

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>
