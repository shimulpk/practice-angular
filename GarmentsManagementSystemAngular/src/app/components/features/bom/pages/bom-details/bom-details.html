<div class="container-fluid">

    <!-- Loading -->

    <div
        *ngIf="loading"
        class="text-center my-5">

        <div class="spinner-border text-primary"></div>

    </div>

    <!-- Details -->

    <div
        class="card shadow"
        *ngIf="!loading && bom">

        <div class="card-header d-flex justify-content-between align-items-center">

            <h3 class="mb-0">

                BOM Details

            </h3>

            <a
                routerLink="/bom"
                class="btn btn-light btn-sm">

                <i class="bi bi-arrow-left"></i>

                Back

            </a>

        </div>

        <div class="card-body">

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="fw-bold">

                        Serial No

                    </label>

                    <p>{{ bom.serial }}</p>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="fw-bold">

                        Style Code

                    </label>

                    <p>{{ bom.styleCode }}</p>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="fw-bold">

                        Style Name

                    </label>

                    <p>{{ bom.styleName }}</p>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="fw-bold">

                        Material Name

                    </label>

                    <p>{{ bom.materialName }}</p>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="fw-bold">

                        Unit

                    </label>

                    <p>{{ bom.unit }}</p>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="fw-bold">

                        Base Fabric

                    </label>

                    <p>{{ bom.baseFabric }}</p>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="fw-bold">

                        Quantity

                    </label>

                    <p>{{ bom.quantity }}</p>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="fw-bold">

                        Unit Price

                    </label>

                    <p>{{ bom.unitPrice | number:'1.2-2' }}</p>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="fw-bold">

                        Total Cost

                    </label>

                    <p class="text-success fw-bold">

                        {{ bom.totalCost | number:'1.2-2' }}

                    </p>

                </div>

            </div>

        </div>

    </div>

</div>
