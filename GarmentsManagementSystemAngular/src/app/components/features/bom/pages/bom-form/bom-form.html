<div class="container-fluid">

    <!-- Header -->

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h3>

            <i class="bi bi-diagram-3-fill"></i>

            {{ isEdit ? 'Edit BOM Item' : 'Add BOM Item' }}

        </h3>

        <a
            class="btn btn-secondary"
            [routerLink]="['/bom/style', styleId]">

            <i class="bi bi-arrow-left"></i>

            Back

        </a>

    </div>

    <!-- Loading -->

    <div
        *ngIf="loading"
        class="text-center py-5">

        <div class="spinner-border text-primary"></div>

    </div>

    <!-- Form -->

    <div
        class="card"
        *ngIf="!loading">

        <div class="card-body">

            <form
                [formGroup]="bomForm"
                (ngSubmit)="saveBom()">

                <div class="row">

                    <!-- Serial -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Serial No

                        </label>

                        <input
                            type="number"
                            class="form-control"
                            formControlName="serial">

                    </div>

                    <!-- Material Name -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Material Name

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            formControlName="materialName">

                    </div>

                    <!-- Unit -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Unit

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            formControlName="unit">

                    </div>

                    <!-- Base Fabric -->

                    <!-- <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Base Fabric

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            formControlName="baseFabric">

                    </div> -->

                    <!-- Quantity -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Quantity

                        </label>

                        <input
                            type="number"
                            class="form-control"
                            formControlName="quantity">

                    </div>

                    <!-- Unit Price -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Unit Price

                        </label>

                        <input
                            type="number"
                            class="form-control"
                            formControlName="unitPrice">

                    </div>

                </div>

                <hr>

                <div class="text-end">

                    <button
                        type="button"
                        class="btn btn-outline-secondary me-2"
                        (click)="resetForm()">

                        <i class="bi bi-arrow-clockwise"></i>

                        Reset

                    </button>

                    <button
                        type="submit"
                        class="btn btn-primary">

                        <i class="bi bi-check-circle"></i>

                        {{ isEdit ? 'Update BOM Item' : 'Save BOM Item' }}

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>
