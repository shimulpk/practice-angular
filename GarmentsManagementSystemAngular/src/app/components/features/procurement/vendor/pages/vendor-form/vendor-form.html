<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h4 class="mb-0">

                {{ isEdit ? 'Edit Vendor' : 'Add Vendor' }}

            </h4>

        </div>

        <div class="card-body">

            <form [formGroup]="vendorForm"
                  (ngSubmit)="saveVendor()">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Company Name
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            formControlName="companyName">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Contact Person
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            formControlName="contactPerson">

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Phone
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            formControlName="phone">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Address
                        </label>

                        <textarea
                            rows="3"
                            class="form-control"
                            formControlName="address">
                        </textarea>

                    </div>

                </div>

                <button
                    type="submit"
                    class="btn btn-success me-2">

                    {{ isEdit ? 'Update' : 'Save' }}

                </button>

                <button
                    type="button"
                    class="btn btn-secondary"
                    (click)="resetForm()">

                    Reset

                </button>

            </form>

        </div>

    </div>

</div>
