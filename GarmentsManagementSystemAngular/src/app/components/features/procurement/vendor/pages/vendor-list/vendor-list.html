<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">

            <h4 class="mb-0">

                Vendor List

            </h4>

            <a
                routerLink="/vendors/add"
                class="btn btn-light">

                <i class="bi bi-plus-circle"></i>

                Add Vendor

            </a>

        </div>

        <div class="card-body">

            <div
                *ngIf="loading"
                class="text-center">

                Loading...

            </div>

            <table
                *ngIf="!loading"
                class="table table-bordered table-hover">

                <thead class="table-dark">

                    <tr>

                        <th>#</th>

                        <th>Company</th>

                        <th>Contact Person</th>

                        <th>Phone</th>

                        <th>Address</th>

                        <th>Status</th>

                        <th width="140">

                            Action

                        </th>

                    </tr>

                </thead>

                <tbody>

                    <tr
                        *ngFor="
                            let vendor of vendors;
                            let i = index
                        ">

                        <td>

                            {{ i + 1 }}

                        </td>

                        <td>

                            {{ vendor.companyName }}

                        </td>

                        <td>

                            {{ vendor.contactPerson }}

                        </td>

                        <td>

                            {{ vendor.phone }}

                        </td>

                        <td>

                            {{ vendor.address }}

                        </td>

                        <td>

                            <span
                                class="badge"
                                [ngClass]="vendor.active ? 'bg-success' : 'bg-danger'">

                                {{ vendor.active ? 'Active' : 'Inactive' }}

                            </span>

                        </td>

                        <td>

                            <button
                                class="btn btn-warning btn-sm me-2"
                                (click)="editVendor(vendor.id)">

                                <i class="bi bi-pencil-square"></i>

                            </button>

                            <button
                                class="btn btn-danger btn-sm"
                                (click)="deleteVendor(vendor.id)">

                                <i class="bi bi-trash"></i>

                            </button>

                        </td>

                    </tr>

                    <tr *ngIf="vendors.length === 0">

                        <td
                            colspan="7"
                            class="text-center text-muted">

                            No Vendor Found

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>
