<div class="container-fluid mt-4">

    <div class="card shadow">

        <!-- Header -->

        <div class="card-header bg-primary text-white">

            <div class="d-flex justify-content-between align-items-center">

                <h4 class="mb-0">

                    {{ isEdit ? 'Edit Store Requisition' : 'Create Store Requisition' }}

                </h4>

                <button
                    class="btn btn-light"
                    routerLink="/store-requisition">

                    <i class="bi bi-arrow-left"></i>

                    Back

                </button>

            </div>

        </div>

        <!-- Body -->

        <div class="card-body">

            <form
                [formGroup]="storeRequisitionForm"
                (ngSubmit)="saveStoreRequisition()">

                <!-- Header Information -->

                <div class="row">

                    <div class="col-md-3 mb-3">

                        <label class="form-label">

                            Requisition Date

                        </label>

                        <input
                            type="date"
                            class="form-control"
                            formControlName="requisitionDate">

                    </div>

                    <div class="col-md-3 mb-3">

                        <label class="form-label">

                            Requested By

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            formControlName="requestedBy">

                    </div>

                    <div class="col-md-3 mb-3">

                        <label class="form-label">

                            Department

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            formControlName="department">

                    </div>

                    <div class="col-md-3 mb-3">

                        <label class="form-label">

                            Remarks

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            formControlName="remarks">

                    </div>

                </div>

                <hr>

                <!-- Items -->

                <div formArrayName="items">

                    <div class="table-responsive">

                        <table class="table table-bordered align-middle">

                            <thead class="table-dark">

                                <tr>

                                    <th width="35%">Item</th>

                                    <th width="15%">Unit</th>

                                    <th width="15%">Quantity</th>

                                    <!-- <th>Remarks</th> -->

                                    <th width="90">

                                        Action

                                    </th>

                                </tr>

                            </thead>

                            <tbody>

                                <tr
                                    *ngFor="let row of itemForms.controls; let i = index"
                                    [formGroupName]="i">

                                    <td>

                                        <select
                                            class="form-select"
                                            formControlName="itemId"
                                            (change)="onItemChange(i)">

                                            <option [ngValue]="null">

                                                Select Item

                                            </option>

                                            <option
                                                *ngFor="let item of items"
                                                [ngValue]="item.id">

                                                {{ item.itemName }}

                                            </option>

                                        </select>

                                    </td>

                                    <td>

                                        <input
                                            type="text"
                                            class="form-control"
                                            formControlName="unit"
                                            readonly>

                                    </td>

                                    <td>

                                        <input
                                            type="number"
                                            class="form-control"
                                            formControlName="quantity">

                                    </td>

                                    <!-- <td>

                                        <input
                                            type="text"
                                            class="form-control"
                                            formControlName="remarks">

                                    </td> -->

                                    <td class="text-center">

                                        <button
                                            type="button"
                                            class="btn btn-danger btn-sm"
                                            (click)="removeItem(i)">

                                            <i class="bi bi-trash"></i>

                                        </button>

                                    </td>

                                </tr>

                            </tbody>

                        </table>

                    </div>

                </div>

                <button
                    type="button"
                    class="btn btn-success mt-2"
                    (click)="addItem()">

                    <i class="bi bi-plus-circle"></i>

                    Add Item

                </button>

                <hr>

                <div class="text-end">

                    <button
                        type="submit"
                        class="btn btn-primary me-2">

                        <i class="bi bi-check-circle"></i>

                        Save

                    </button>

                    <button
                        type="button"
                        class="btn btn-secondary me-2"
                        (click)="resetForm()">

                        Reset

                    </button>

                    <button
                        type="button"
                        class="btn btn-outline-dark"
                        routerLink="/store-requisition">

                        Cancel

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>
