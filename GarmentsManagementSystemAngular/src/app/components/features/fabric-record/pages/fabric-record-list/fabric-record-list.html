<div class="container-fluid mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">

            <h4 class="mb-0">

                Fabric Record List

            </h4>

            <a
                routerLink="/fabric-record-check/add"
                class="btn btn-light">

                + Generate New

            </a>

        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-bordered table-hover">

                    <thead class="table-dark">

                    <tr>

                        <th>#</th>

                        <th>Order No</th>

                        <th>PO Number</th>

                        <th>Style</th>

                        <th>Total Fabric</th>

                        <th>Created Date</th>

                        <th width="180">

                            Action

                        </th>

                    </tr>

                    </thead>

                    <tbody>

                    <tr
                        *ngFor="let record of records; let i=index">

                        <td>

                            {{i+1}}

                        </td>

                        <td>

                            {{record.orderCode}}

                        </td>

                        <td>

                            {{record.poNumber}}

                        </td>

                        <td>

                            {{record.styleName}}

                        </td>

                        <td>

                            {{record.totalFabricRequired | number:'1.2-2'}}

                        </td>

                        <td>

                            {{record.createdAt | date:'dd-MMM-yyyy'}}

                        </td>

                        <td>

                            <a
                                class="btn btn-sm btn-info me-2"
                                [routerLink]="[
                                    '/fabric-record-check',
                                    record.id
                                ]">

                                View

                            </a>

                            <button
                                class="btn btn-sm btn-danger"
                                (click)="deleteRecord(record.id)">

                                Delete

                            </button>

                        </td>

                    </tr>

                    <tr *ngIf="records.length==0">

                        <td
                            colspan="7"
                            class="text-center">

                            No Fabric Record Found

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>
