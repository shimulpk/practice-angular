<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow border-0">

                <div class="card-header bg-primary text-white">

                    <h4 class="mb-0">

                        <i class="bi bi-person-plus-fill me-2"></i>

                        {{ editMode ? 'Update User' : 'User Registration' }}

                    </h4>

                </div>

                <div class="card-body">

                    <form
                        [formGroup]="form"
                        (ngSubmit)="submit()">

                        <div class="row">

                            <!-- Name -->

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Full Name

                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    formControlName="name"
                                    placeholder="Enter full name">

                                <small
                                    class="text-danger"
                                    *ngIf="form.get('name')?.touched && form.get('name')?.invalid">

                                    Name is required.

                                </small>

                            </div>

                            <!-- Email -->

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Email

                                </label>

                                <input
                                    type="email"
                                    class="form-control"
                                    formControlName="email"
                                    placeholder="Enter email">

                                <small
                                    class="text-danger"
                                    *ngIf="form.get('email')?.touched && form.get('email')?.invalid">

                                    Valid email is required.

                                </small>

                            </div>

                            <!-- Phone -->

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Phone

                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    formControlName="phone"
                                    placeholder="Enter phone">

                                <small
                                    class="text-danger"
                                    *ngIf="form.get('phone')?.touched && form.get('phone')?.invalid">

                                    Phone is required.

                                </small>

                            </div>

                            <!-- Password -->

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Password

                                </label>

                                <input
                                    type="password"
                                    class="form-control"
                                    formControlName="password"
                                    placeholder="Enter password">

                                <small
                                    class="text-danger"
                                    *ngIf="form.get('password')?.touched && form.get('password')?.invalid">

                                    Password is required.

                                </small>

                            </div>

                            <!-- Role -->

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Role

                                </label>

                                <select
                                    class="form-select"
                                    formControlName="role">

                                    <option value="">

                                        Select Role

                                    </option>

                                    <option
                                        *ngFor="let role of roles"
                                        [value]="role">

                                        {{ role }}

                                    </option>

                                </select>

                                <small
                                    class="text-danger"
                                    *ngIf="form.get('role')?.touched && form.get('role')?.invalid">

                                    Role is required.

                                </small>

                            </div>

                            <!-- Active -->

                            <div class="col-md-6 mb-3">

                                <label class="form-label d-block">

                                    Status

                                </label>

                                <div class="form-check form-switch mt-2">

                                    <input
                                        class="form-check-input"
                                        type="checkbox"
                                        formControlName="active">

                                    <label class="form-check-label">

                                        Active User

                                    </label>

                                </div>

                            </div>

                        </div>

                        <hr>

                        <div class="d-flex gap-2">

                            <button
                                class="btn btn-success"
                                type="submit">

                                <i class="bi bi-check-circle me-1"></i>

                                {{ editMode ? 'Update User' : 'Save User' }}

                            </button>

                            <button
                                class="btn btn-secondary"
                                type="button"
                                (click)="resetForm()">

                                <i class="bi bi-arrow-clockwise me-1"></i>

                                Reset

                            </button>

                            <a
                                routerLink="/users"
                                class="btn btn-outline-dark ms-auto">

                                <i class="bi bi-list"></i>

                                User List

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>
