<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">

  <div class="card shadow border-0" style="width:100%;max-width:500px;">

    <!-- Header -->

    <div class="card-header bg-primary text-white text-center py-4">

      <i class="bi bi-shield-lock-fill fs-1 d-block mb-2"></i>

      <h4 class="mb-0">Change Password</h4>

      <small>Update your account password</small>

    </div>

    <div class="card-body p-4">

      <!-- Success -->

      <div
        *ngIf="successMessage"
        class="alert alert-success">

        <i class="bi bi-check-circle-fill me-2"></i>

        {{ successMessage }}

      </div>

      <!-- Error -->

      <div
        *ngIf="errorMessage"
        class="alert alert-danger">

        <i class="bi bi-exclamation-triangle-fill me-2"></i>

        {{ errorMessage }}

      </div>

      <form
        #form="ngForm"
        (ngSubmit)="form.valid && !passwordMismatch && submit()">

        <!-- Current Password -->

        <div class="mb-3">

          <label class="form-label">

            Current Password

          </label>

          <div class="input-group">

            <span class="input-group-text">

              <i class="bi bi-lock-fill"></i>

            </span>

            <input
              [type]="showCurrentPassword ? 'text':'password'"
              class="form-control"
              name="currentPassword"
              [(ngModel)]="dto.currentPassword"
              required>

            <button
              class="btn btn-outline-secondary"
              type="button"
              (click)="showCurrentPassword=!showCurrentPassword">

              <i
                class="bi"
                [ngClass]="showCurrentPassword ? 'bi-eye-slash':'bi-eye'">

              </i>

            </button>

          </div>

        </div>

        <!-- New Password -->

        <div class="mb-3">

          <label class="form-label">

            New Password

          </label>

          <div class="input-group">

            <span class="input-group-text">

              <i class="bi bi-key-fill"></i>

            </span>

            <input
              [type]="showNewPassword ? 'text':'password'"
              class="form-control"
              name="newPassword"
              [(ngModel)]="dto.newPassword"
              minlength="6"
              required>

            <button
              class="btn btn-outline-secondary"
              type="button"
              (click)="showNewPassword=!showNewPassword">

              <i
                class="bi"
                [ngClass]="showNewPassword ? 'bi-eye-slash':'bi-eye'">

              </i>

            </button>

          </div>

          <small class="text-muted">

            Minimum 6 characters.

          </small>

        </div>

        <!-- Confirm Password -->

        <div class="mb-4">

          <label class="form-label">

            Confirm Password

          </label>

          <div class="input-group">

            <span class="input-group-text">

              <i class="bi bi-check2-circle"></i>

            </span>

            <input
              [type]="showConfirmPassword ? 'text':'password'"
              class="form-control"
              name="confirmPassword"
              [(ngModel)]="dto.confirmPassword"
              required>

            <button
              class="btn btn-outline-secondary"
              type="button"
              (click)="showConfirmPassword=!showConfirmPassword">

              <i
                class="bi"
                [ngClass]="showConfirmPassword ? 'bi-eye-slash':'bi-eye'">

              </i>

            </button>

          </div>

          <small
            class="text-danger"
            *ngIf="passwordMismatch">

            Passwords do not match.

          </small>

        </div>

        <!-- Buttons -->

        <div class="d-grid gap-2">

          <button
            class="btn btn-primary"
            [disabled]="loading || passwordMismatch">

            <span
              *ngIf="loading"
              class="spinner-border spinner-border-sm me-2">

            </span>

            <i
              *ngIf="!loading"
              class="bi bi-check-circle me-2">

            </i>

            {{ loading ? 'Updating...' : 'Change Password' }}

          </button>

          <a
            routerLink="/dashboard"
            class="btn btn-outline-secondary">

            Cancel

          </a>

        </div>

      </form>

    </div>

  </div>

</div>
