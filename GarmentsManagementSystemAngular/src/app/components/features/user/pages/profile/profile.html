<div class="container-fluid">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow border-0">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">
            <i class="bi bi-person-circle me-2"></i>

            My Profile
          </h4>
        </div>

        <div class="card-body">
          <div *ngIf="loading" class="text-center py-5">
            <div class="spinner-border text-primary"></div>
          </div>

          <form *ngIf="!loading" [formGroup]="form" (ngSubmit)="save()">
            <div class="row">
              <!-- Name -->

              <div class="col-md-6 mb-3">
                <label class="form-label"> Full Name </label>

                <input type="text" class="form-control" formControlName="name" />

                <small
                  class="text-danger"
                  *ngIf="form.get('name')?.touched && form.get('name')?.invalid"
                >
                  Name is required.
                </small>
              </div>

              <!-- Email -->

              <div class="col-md-6 mb-3">
                <label class="form-label"> Email </label>

                <input type="email" class="form-control" formControlName="email" readonly />
              </div>

              <!-- Phone -->

              <div class="col-md-6 mb-3">
                <label class="form-label"> Phone </label>

                <input type="text" class="form-control" formControlName="phone" />

                <small
                  class="text-danger"
                  *ngIf="form.get('phone')?.touched && form.get('phone')?.invalid"
                >
                  Phone is required.
                </small>
              </div>

              <!-- Role -->

              <div class="col-md-6 mb-3">
                <label class="form-label"> Role </label>

                <input type="text" class="form-control" formControlName="role" readonly />
              </div>

              <!-- Status -->

              <div class="col-md-6 mb-3">
                <label class="form-label d-block"> Status </label>

                <div class="form-check form-switch mt-2">
                  <input class="form-check-input" type="checkbox" formControlName="active" />

                  <label class="form-check-label"> Active User </label>
                </div>
              </div>
            </div>

            <hr />

            <div class="d-flex gap-2">
              <button class="btn btn-success" type="submit" [disabled]="saving">
                <span *ngIf="saving" class="spinner-border spinner-border-sm me-2"> </span>

                <i *ngIf="!saving" class="bi bi-check-circle me-1"> </i>

                {{ saving ? 'Updating...' : 'Update Profile' }}
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
